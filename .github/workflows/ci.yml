name: CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - main

jobs:
  json-validate:
    name: JSON 语法验证
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate JSON (pipeline-data + schemas)
        run: |
          python3 - << 'PYEOF'
          import json, sys
          from pathlib import Path
          patterns = ['pipeline-data/**/*.json', 'schemas/**/*.json']
          files = []
          for p in patterns:
              files.extend(Path('.').glob(p))
          files = sorted(files)
          errors = []
          for f in files:
              try:
                  json.load(f.open(encoding='utf-8'))
                  print(f'  PASS  {f}')
              except Exception as e:
                  errors.append(f'  FAIL  {f}: {e}')
          if errors:
              print('\nJSON validation FAILED:')
              for e in errors:
                  print(e)
              sys.exit(1)
          print(f'\nJSON validation PASS ({len(files)} files)')
          PYEOF

  dao-guard:
    name: 道层零漂移守护
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run 道层守护 v5.1
        run: bash scripts/.dao-guard.sh .
