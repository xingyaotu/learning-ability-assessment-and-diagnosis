name: Validate
# 道层 Compliance: v5.10 | JSON 验证 + 内容检查 + 四元组联动验证 + 跨库 schema 验证 + IRT 配置验证 + IRT 种子验证 + IRT 评分阈值验证 + 进度 schema 验证 + CAT 配置验证 + 报告 schema 验证 + MECE 科目画像验证 + MECE 诊断规则验证
on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]

jobs:
  json-validate:
    name: JSON 文件格式验证
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 验证 JSON 文件
        run: |
          FAIL=0
          for f in $(find . -name "*.json" -not -path "./.git/*"); do
            python3 -c "import json,sys; json.load(open('$f'))" 2>&1 && echo "✅ $f" || { echo "❌ $f"; FAIL=1; }
          done
          exit $FAIL

  content-check:
    name: 道层漂移关键词检测
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 检测道层漂移(6 类)
        run: |
          FAIL=0
          # 模式1: 八步第5步误用"演示"
          if grep -rE "⑤[[:space:]]*演示|第五步[[:space:]]*演示" --include="*.md" --include="*.json" .; then
            echo "❌ 道层漂移: 八步第5步不是演示"; FAIL=1
          else echo "✅ 八步第5步合规"; fi

          # 模式2: 六飞轮错误变体
          if grep -rE "错题飞轮|笔记飞轮|阅读飞轮|实践飞轮" --include="*.md" --include="*.json" .; then
            echo "❌ 道层漂移: 六飞轮含非法变体"; FAIL=1
          else echo "✅ 六飞轮名称合规"; fi

          # 模式3: FIRE-UP 5字母误用
          if grep -rE "Foundation.*Identity.*Roadmap.*Execute.*UP[^a-zA-Z]" --include="*.md" --include="*.json" .; then
            echo "❌ 道层漂移: FIRE-UP 应为6字母"; FAIL=1
          else echo "✅ FIRE-UP 6字母合规"; fi

          exit $FAIL

  quadruple-linkage:
    name: 四元组联动验证(七阶/八步/六飞轮)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 运行四元组联动验证脚本
        run: python3 scripts/validate-quadruple-linkage.py

  cross-schema:
    name: 跨库 schema 联动验证(assessment ↔ quadruple-actions)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 运行跨库联动验证脚本
        run: python3 scripts/validate-cross-schema.py

  irt-config:
    name: IRT 配置合规验证(22工具 × 1PL/2PL/3PL)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 运行 IRT 配置验证脚本
        run: python3 scripts/validate-irt-config.py

  irt-seed:
    name: IRT 标定种子验证(seed ↔ catalog 一致性 + 参数合规)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 运行 IRT 种子验证脚本
        run: python3 scripts/validate-irt-seed.py

  irt-scoring:
    name: IRT 评分阈值验证(θ→七阶 切分 + 权重归一化)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 运行 IRT 评分阈值验证脚本
        run: python3 scripts/validate-irt-scoring.py

  progress-schema:
    name: 学生进度 schema 验证(PIPL合规 + ⑤守护 + MECE四维度)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 运行学生进度 schema 验证脚本
        run: python3 scripts/validate-progress-schema.py

  cat-config:
    name: CAT 自适应测评配置验证(1PL固定施测 + 停止规则 + 曝光控制)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 运行 CAT 配置验证脚本
        run: python3 scripts/validate-cat-config.py

  report-schema:
    name: 测评报告 schema 验证(MECE/四门户/⑤守护/PIPL)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 运行测评报告 schema 验证脚本
        run: python3 scripts/validate-report-schema.py

  mece-profiles:
    name: MECE 科目画像验证(9科目 × 四维度权重 + 主瓶颈维度)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 运行 MECE 科目画像验证脚本
        run: python3 scripts/validate-mece-profiles.py

  mece-diagnosis-rules:
    name: MECE 诊断规则验证(七阶×四维度路由 + ⑤守护 + 飞轮兼容矩阵)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 运行 MECE 诊断规则验证脚本
        run: python3 scripts/validate-mece-diagnosis-rules.py
